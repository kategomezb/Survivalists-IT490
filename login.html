<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Survivalists - Login Page</title>
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <div class="card">
        <div class="image">
            <div class="outerGlow"></div>
            <!-- I left the animation delay in 1.5 because it looks more natural, and it fits the space -->
            <div class="outerGlow" style="animation-delay: 1.5s;"></div>
            
            <!-- i got the image from here: https://unsplash.com/photos/black-concrete-road-surrounded-by-brown-rocks-tMzCrBkM99Y -->
            <div class="profile">
                <img src="images/loginImage.jpg" alt="Profile Picture">
            </div>
        </div>

        <div class="form">
            <h2>We are <strong>SURVIVALISTS</strong></h2>
            
            <form method="post" action="loginRequest.php">
                <div class="input">
                    <span class="labels">Username</span>
                    <input type="text" name="username" class="field-style" placeholder="Please type your username." required>
                </div>

                <div class="input">
                    <span class="labels">Password</span>
                    <input type="password" name="password" class="field-style" placeholder="Please type your password." required>
                </div>

                <input type="submit" value="Login" class="loginButton">
            </form>

            <a href="registration.html" class="signup">Create your Account &rarr;</a>
        </div>
    </div>
</body>
</html>
